              <p>明月出天山，<br>
苍茫云海间。</p>
<p>长风几万里，<br>
吹度玉门关。</p>
<p>汉下白登道，<br>
胡窥青海湾。</p>
<p>由来征战地，<br>
不见有人还。</p>
<p>戍客望边色，<br>
思归多苦颜。</p>
<p>高楼当此业，<br>
叹息未应闲。</p>
<p>《关山月》 李白</p>

            </div>
